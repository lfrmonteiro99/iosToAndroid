name: Auto Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  release:
    name: Create Release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.next }}
      bump: ${{ steps.bump.outputs.bump }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump from closed issues
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const prLabels = context.payload.pull_request.labels.map(l => l.name);

            // ---------------------------------------------------------------
            // 1. Collect issue numbers referenced in the PR
            //    Matches: Closes #123, Fixes #456, Resolves #789, (#123)
            // ---------------------------------------------------------------
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*#(\d+)/gi;
            const parenPattern = /\(#(\d+)\)/g;
            const issueNumbers = new Set();

            let m;
            for (const text of [prTitle, prBody]) {
              while ((m = issuePattern.exec(text)) !== null) issueNumbers.add(parseInt(m[1]));
              while ((m = parenPattern.exec(text)) !== null) issueNumbers.add(parseInt(m[1]));
            }

            console.log(`Found issue references: ${[...issueNumbers].join(', ') || 'none'}`);

            // ---------------------------------------------------------------
            // 2. Fetch labels for each referenced issue
            // ---------------------------------------------------------------
            const allLabels = new Set(prLabels);

            for (const num of issueNumbers) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                for (const label of issue.data.labels) {
                  const name = typeof label === 'string' ? label : label.name;
                  if (name) allLabels.add(name);
                }
                console.log(`Issue #${num} labels: ${issue.data.labels.map(l => typeof l === 'string' ? l : l.name).join(', ')}`);
              } catch (e) {
                console.log(`Could not fetch issue #${num}: ${e.message}`);
              }
            }

            console.log(`All collected labels: ${[...allLabels].join(', ') || 'none'}`);

            // ---------------------------------------------------------------
            // 3. Determine bump level (major > minor > patch)
            // ---------------------------------------------------------------
            const majorLabels = ['major', 'breaking', 'breaking-change'];
            const minorLabels = ['enhancement', 'feature', 'minor'];
            // Everything else (bug, critical, dead-code, testing, etc.) → patch

            let bump = 'patch';
            for (const label of allLabels) {
              const lower = label.toLowerCase();
              if (majorLabels.includes(lower)) { bump = 'major'; break; }
              if (minorLabels.includes(lower)) bump = 'minor';
            }

            console.log(`Determined bump: ${bump}`);
            core.setOutput('bump', bump);

      - name: Read current version from latest git tag and compute next
        id: version
        run: |
          # Use the latest semver git tag as the source of truth (not app.json)
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump.outputs.bump }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT → $NEXT ($BUMP) [from tag: $LATEST_TAG]"

      - name: Update version in app.json and package.json
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          node -e "
            const fs = require('fs');

            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.version = '${NEXT}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated app.json and package.json to $NEXT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push

      - name: Create tag and release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.next }}';
            const bump = '${{ steps.bump.outputs.bump }}';
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;
            const prBody = context.payload.pull_request.body || '';

            // Build release body
            const lines = [
              `## What's Changed`,
              ``,
              `**${prTitle}** ([#${prNumber}](${prUrl}))`,
              ``,
              `Version bump: **${bump}** (\`${{ steps.version.outputs.current }}\` → \`${version}\`)`,
              ``,
            ];

            // Extract issue references for the changelog
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*#(\d+)/gi;
            const parenPattern = /\(#(\d+)\)/g;
            const issueNumbers = new Set();
            let m;
            for (const text of [prTitle, prBody]) {
              while ((m = issuePattern.exec(text)) !== null) issueNumbers.add(parseInt(m[1]));
              while ((m = parenPattern.exec(text)) !== null) issueNumbers.add(parseInt(m[1]));
            }

            if (issueNumbers.size > 0) {
              lines.push(`### Issues Addressed`);
              for (const num of issueNumbers) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                  });
                  const labels = issue.data.labels.map(l => typeof l === 'string' ? l : l.name).join(', ');
                  lines.push(`- #${num} — ${issue.data.title} ${labels ? `(\`${labels}\`)` : ''}`);
                } catch {
                  lines.push(`- #${num}`);
                }
              }
              lines.push('');
            }

            lines.push(`**Full Changelog**: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/v${{ steps.version.outputs.current }}...${tag}`);

            // Create the release (which also creates the tag)
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: 'main',
              name: `${tag} — ${prTitle}`,
              body: lines.join('\n'),
              draft: false,
              prerelease: false,
            });

            console.log(`Created release: ${release.data.html_url}`);
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);

  # =====================================================================
  # Build APK and attach to the release
  # Note: GitHub Actions does not trigger other workflows (build-apk.yml)
  # from events created by GITHUB_TOKEN, so we build inline here.
  # =====================================================================
  build-apk:
    name: Build & Attach APK
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest (includes version bump commit)
        run: git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosToAndroid-${{ needs.release.outputs.tag }}
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: android/app/build/outputs/apk/release/*.apk
